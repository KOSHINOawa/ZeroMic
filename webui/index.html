<!DOCTYPE html>
<html lang="zh-CN" class="mdui-theme-dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZeroMic - 客户端</title>
    
    <link rel="stylesheet" href="./lib/mdui.css">
    <script src="./lib/mdui.global.js"></script>
    <link href="./lib/mdui-icons.css" rel="stylesheet">
    <script src="./lib/socket.io.min.js"></script>

    <style>
        :root {
            
            --color-initial: #757575;          
            --color-muted: rgb(255, 179, 174); 
            --color-bg: #121212;
            --color-card: #1e1e1e;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: var(--color-bg);
            font-family: 'Roboto', sans-serif;
            overflow: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 400px;
            padding: 24px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header { text-align: center; margin-bottom: 24px; width: 100%; }
        .header h1 { font-size: 28px; margin: 0; font-weight: 500; letter-spacing: 1px; color: rgba(255,255,255,0.9); }
        .header p { font-size: 13px; opacity: 0.5; margin: 6px 0 0; font-family: monospace; }

        .status-card {
            background-color: var(--color-card);
            border-radius: 24px;
            padding: 16px 24px;
            width: 100%;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px; 
        }
        .status-info { display: flex; flex-direction: column; }
        .status-title { font-size: 13px; opacity: 0.6; }
        .status-value { font-size: 16px; font-weight: bold; margin-top: 6px; display: flex; align-items: center; gap: 8px;}
        .dot { width: 10px; height: 10px; border-radius: 50%; }
        .dot.disconnected { background-color: #888; }
        .dot.connected { background-color: #4CAF50; box-shadow: 0 0 8px #4CAF50; }

        
        .control-card {
            width: 100%;
            background-color: var(--color-card);
            border-radius: 24px;
            padding: 16px 20px;
            box-sizing: border-box;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        
        .mic-section {
            position: relative;
            width: 240px;
            height: 240px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .volume-ring {
            position: absolute;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            opacity: 0.2;
            z-index: 0;
            transition: transform 0.05s linear;
            pointer-events: none;
        }

        .mic-button {
            width: 140px;
            height: 140px;
            border-radius: 50% !important;
            z-index: 1;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        
        
        .mic-button.initial { background-color: var(--color-initial) !important; color: #fff !important; }
        .volume-ring.initial { background-color: transparent; opacity: 0; }

        
        .mic-button.active { background-color: rgb(var(--mdui-color-primary)) !important; color: rgb(var(--mdui-color-on-primary)) !important; }
        .volume-ring.active { background-color: rgb(var(--mdui-color-primary)); }

        
        .mic-button.muted { background-color: var(--color-muted) !important; color: #4a0005 !important; }
        .volume-ring.muted { background-color: var(--color-muted); transform: scale(1) !important; opacity: 0.1; }

        .status-text { margin-top: 32px; font-size: 16px; letter-spacing: 1px; transition: color 0.3s; font-weight: 500; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        
        <h1><mdui-icon name="podcasts" style="font-size: 20px; margin-right: 10px; color: rgb(var(--mdui-color-primary));"></mdui-icon>ZeroMic</h1>
        <p>Client Mode | v0.0.2 内部测试 | by：Hypixice</p>
    </div>

    <div class="status-card">
        <div class="status-info">
            <span class="status-title">主机连接状态</span>
            <span class="status-value">
                <div class="dot disconnected" id="connection-dot"></div>
                <span id="connection-text">等待连接...</span>
            </span>
        </div>
        <mdui-icon name="computer" style="opacity: 0.7;"></mdui-icon>
    </div>

    <div class="control-card">
        <mdui-icon name="volume_down" style="opacity: 0.7;"></mdui-icon>
        <mdui-slider id="gain-slider" min="0" max="3" step="0.1" value="1" style="flex-grow: 1;"></mdui-slider>
        <mdui-icon name="volume_up" style="opacity: 0.7;"></mdui-icon>
    </div>

    <div class="mic-section">
        <div class="volume-ring initial" id="volume-ring"></div>
        <mdui-button-icon class="mic-button initial" id="mic-toggle">
            <mdui-icon name="mic_none" id="mic-icon" style="font-size: 48px;"></mdui-icon>
        </mdui-button-icon>
    </div>
    
    <div class="status-text" id="status-label" style="color: var(--color-initial);">点击授权并连接</div>
</div>

<script>
    mdui.setColorScheme('#4285F4'); 

    const micBtn = document.getElementById('mic-toggle');
    const micIcon = document.getElementById('mic-icon');
    const statusLabel = document.getElementById('status-label');
    const volumeRing = document.getElementById('volume-ring');
    const gainSlider = document.getElementById('gain-slider');
const socket = io(window.location.origin);
    let peerConnection;
    const rtcConfig = { iceServers: [] }; 

    socket.on('connect', () => {
        socket.emit('join', { role: 'mobile' });
        document.getElementById('connection-dot').classList.replace('disconnected', 'connected');
        const text = document.getElementById('connection-text');
        text.innerText = '已连接到主机';
        text.style.color = '#4CAF50';
    });

    socket.on('answer', async (data) => {
        if(peerConnection) {
            await peerConnection.setRemoteDescription(new RTCSessionDescription(data));
        }
    });

    socket.on('ice_candidate', (data) => {
        if(peerConnection) {
            peerConnection.addIceCandidate(new RTCIceCandidate(data));
        }
    });
    
    let currentState = 'initial'; 
    let audioContext, analyser, dataArray, source, gainNode;
    let animationId;
    let wakeLock = null;

    
    async function requestWakeLock() {
        if ('wakeLock' in navigator) {
            try {
                wakeLock = await navigator.wakeLock.request('screen');
                console.log('屏幕常亮已开启');
            } catch (err) {
                console.error(`唤醒锁失败: ${err.name}, ${err.message}`);
            }
        }
    }

    function releaseWakeLock() {
        if (wakeLock !== null) {
            wakeLock.release().then(() => {
                wakeLock = null;
                console.log('屏幕常亮已释放');
            });
        }
    }

    
    document.addEventListener('visibilitychange', async () => {
        if (wakeLock !== null && document.visibilityState === 'visible' && currentState === 'active') {
            await requestWakeLock();
        }
    });

    
    function drawVolume() {
        if (currentState !== 'active') return;
        
        animationId = requestAnimationFrame(drawVolume);
        analyser.getByteFrequencyData(dataArray);
        
        let sum = 0;
        for(let i = 0; i < dataArray.length; i++) { sum += dataArray[i]; }
        let average = sum / dataArray.length;
        
        
        let scale = 1 + (Math.max(0, average - 10) / 100); 
        volumeRing.style.transform = `scale(${scale})`;
    }

    
    micBtn.addEventListener('click', async () => {
        
        if (currentState === 'initial') {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: {
                    echoCancellation: true,
                    noiseSuppression: true,
                    autoGainControl: false 
                }});
                
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                
                
                source = audioContext.createMediaStreamSource(stream);
                gainNode = audioContext.createGain();
                gainNode.gain.value = gainSlider.value; 

                source.connect(gainNode);
                gainNode.connect(analyser);
                peerConnection = new RTCPeerConnection(rtcConfig);
                    
                peerConnection.onicecandidate = (event) => {
                    if (event.candidate) socket.emit('ice_candidate', event.candidate);
                };

                
                const dest = audioContext.createMediaStreamDestination();
                gainNode.connect(dest);
                dest.stream.getTracks().forEach(track => peerConnection.addTrack(track, dest.stream));

                
                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);
                socket.emit('offer', offer);
                analyser.fftSize = 256;
                dataArray = new Uint8Array(analyser.frequencyBinCount);

                
                currentState = 'active';
                updateUI();
                drawVolume();
                requestWakeLock(); 

            } catch (err) {
                mdui.alert({ headline: '权限被拒绝', description: '请允许浏览器访问麦克风。', confirmText: '好' });
            }
        } 
        
        else if (currentState === 'active') {
            currentState = 'muted';
            updateUI();
            releaseWakeLock(); 
            
            
            if (gainNode) gainNode.gain.value = 0;
        } 
        
        else if (currentState === 'muted') {
            currentState = 'active';
            updateUI();
            requestWakeLock();
            
            
            if (gainNode) gainNode.gain.value = gainSlider.value;
            drawVolume();
        }
    });

    
    gainSlider.addEventListener('input', (e) => {
        const val = parseFloat(e.target.value);
        
        if (gainNode && currentState === 'active') {
            gainNode.gain.value = val;
        }
    });

    
    function updateUI() {
        micBtn.className = `mic-button ${currentState}`;
        volumeRing.className = `volume-ring ${currentState}`;
        
        if (currentState === 'active') {
            micIcon.setAttribute('name', 'mic');
            statusLabel.innerText = '麦克风传输中...';
            statusLabel.style.color = 'rgb(var(--mdui-color-primary))';
        } else if (currentState === 'muted') {
            micIcon.setAttribute('name', 'mic_off');
            statusLabel.innerText = '已静音';
            statusLabel.style.color = 'var(--color-muted)';
        }
    }

    
    setTimeout(() => {
        document.getElementById('connection-dot').classList.replace('disconnected', 'connected');
        const text = document.getElementById('connection-text');
        text.innerText = '已连接到主机';
        text.style.color = '#4CAF50';
    }, 1500);
</script>

</body>
</html>
